server:
  port: ${PORT:8080}

spring:
  # Spring Boot has NO built-in .env support (unlike Node.js) - without this
  # line, a backend/.env file is just an inert text file that nothing reads,
  # and every ${VAR:default} placeholder below silently falls back to its
  # default (often empty string). This tells Spring to parse .env as if it
  # were a .properties file (simple KEY=VALUE lines, which .env already is).
  # "optional:" means startup doesn't fail if the file is absent (e.g. in
  # production, where real environment variables are set directly by the
  # platform instead of a checked-in file).
  config:
    import: "optional:file:.env[.properties]"

  application:
    name: resolvo-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/resolvo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Conservative defaults for a single small Postgres instance (Render/Neon/Supabase
      # free tiers cap connections low) - tune upward only if the DB plan supports it.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
          # Batches lazy-load calls Hibernate couldn't avoid into fewer round trips -
          # a defense-in-depth complement to the @EntityGraph fetch-joins already in
          # ComplaintRepository, not a replacement for them.
          batch_size: 20
        default_batch_fetch_size: 20
    open-in-view: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          # Without explicit timeouts, a network-level SMTP hang (common on
          # cloud platforms with restrictive outbound rules) blocks the
          # mail thread indefinitely. These are generous but bounded.
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

resolvo:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-base64-secret-in-prod-please-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  complaint:
    overdue-threshold-days: ${OVERDUE_THRESHOLD_DAYS:5}
    # How often OverdueComplaintScheduler scans for newly-overdue complaints.
    # Default: every hour. Configurable, not hardcoded in the scheduler itself.
    overdue-scan-interval-ms: ${OVERDUE_SCAN_INTERVAL_MS:3600000}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  mail:
    from: ${MAIL_FROM:noreply@resolvo.app}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        # Deliberately minimal - only health/info are exposed, never the full
        # actuator surface (env, beans, etc. can leak configuration/secrets).
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.resolvo.backend: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"