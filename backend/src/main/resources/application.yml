server:
  port: ${PORT:8080}

spring:
  application:
    name: resolvo-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/resolvo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

resolvo:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-base64-secret-in-prod-please-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  complaint:
    overdue-threshold-days: ${OVERDUE_THRESHOLD_DAYS:5}
    # How often OverdueComplaintScheduler scans for newly-overdue complaints.
    # Default: every hour. Configurable, not hardcoded in the scheduler itself.
    overdue-scan-interval-ms: ${OVERDUE_SCAN_INTERVAL_MS:3600000}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  mail:
    from: ${MAIL_FROM:noreply@resolvo.app}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.resolvo.backend: INFO
    org.springframework.security: WARN