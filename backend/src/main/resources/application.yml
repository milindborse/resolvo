# backend/src/main/resources/application.yml
server:
  port: ${PORT:8080}

spring:
  config:
    import: "optional:file:.env[.properties]"
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  application:
    name: resolvo-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/resolvo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 20
        default_batch_fetch_size: 20
    open-in-view: false



  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

resolvo:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-base64-secret-in-prod-please-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  complaint:
    overdue-threshold-days: ${OVERDUE_THRESHOLD_DAYS:5}
    overdue-scan-interval-ms: ${OVERDUE_SCAN_INTERVAL_MS:3600000}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  sendgrid:
    api-key: ${SENDGRID_API_KEY:}
    from: ${SENDGRID_FROM:noreply@resolvo.app}
  groq:
    api-key: ${GROQ_API_KEY:}
    model: ${GROQ_MODEL:llama-3.1-8b-instant}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.resolvo.backend: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"