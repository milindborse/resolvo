# src/main/resources/application-prod.yml
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
          batch_size: 20
        default_batch_fetch_size: 20
    open-in-view: false



  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

resolvo:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  complaint:
    overdue-threshold-days: ${OVERDUE_THRESHOLD_DAYS:5}
    overdue-scan-interval-ms: ${OVERDUE_SCAN_INTERVAL_MS:3600000}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    from: ${SENDGRID_FROM}
  groq:
    api-key: ${GROQ_API_KEY}
    model: ${GROQ_MODEL:llama-3.1-8b-instant}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.resolvo.backend: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"